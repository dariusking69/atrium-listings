<!DOCTYPE html>
<!--
  ATRIUM RESIDENTIAL LISTINGS WIDGET  (Squarespace-friendly)
  ----------------------------------------------------------
  Replicates meetatrium.com/residential-listings: sticky map with pins on the
  left, card grid on the right, full filter bar. Data comes from the public
  AppFolio feed (listings.json), so no API key is needed for the listings.

  HOW TO EMBED IN SQUARESPACE
  1. Host listings.json + the homes/ folder somewhere public (e.g. GitHub Pages).
  2. In the script's CONFIG block below, set DATA_URL and DETAIL_BASE to those URLs.
  3. (Optional, for true Google Maps) set GOOGLE_MAPS_API_KEY. If left blank, the
     widget renders an OpenStreetMap map with the same red pins — works instantly,
     no key required.
  4. Paste everything between the "WIDGET START" and "WIDGET END" markers below into a
     Squarespace Code Block (or Settings, Advanced, Code Injection).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1520 Neo Landings Loop — Kissimmee — Available Units</title>
</head>
<body style="margin:0">

<!-- WIDGET START -->
<div id="atr-root">
  <div class="atr-head">1520 Neo Landings Loop — Kissimmee<span>Available units</span></div>
  <div class="atr-bar">
    <input id="atr-q" class="atr-in" type="search" placeholder="Search by address…" autocomplete="off">
    <input id="atr-min" class="atr-in atr-sm" type="number" inputmode="numeric" placeholder="Min Rent">
    <input id="atr-max" class="atr-in atr-sm" type="number" inputmode="numeric" placeholder="Max Rent">
    <select id="atr-beds" class="atr-in"><option value="">Beds</option><option value="0">Studio</option><option value="1">1+</option><option value="2">2+</option><option value="3">3+</option><option value="4">4+</option><option value="5">5+</option></select>
    <select id="atr-baths" class="atr-in"><option value="">Baths</option><option value="1">1+</option><option value="2">2+</option><option value="3">3+</option></select>
    <select id="atr-city" class="atr-in"><option value="">City</option></select>
    <select id="atr-zip" class="atr-in"><option value="">Zip</option></select>
    <select id="atr-sort" class="atr-in"><option value="rent_desc">Rent (High to Low)</option><option value="rent_asc">Rent (Low to High)</option><option value="new">Newest</option></select>
    <button id="atr-reset" class="atr-reset" type="button">Reset</button>
    <span id="atr-count" class="atr-count"></span>
  </div>
  <div class="atr-split">
    <div class="atr-map-wrap"><div id="atr-map"></div></div>
    <div id="atr-grid" class="atr-grid"></div>
  </div>
  <div id="atr-empty" class="atr-empty" style="display:none">No homes match your filters.</div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap');
#atr-root{--red:#f13d3d;--ink:#070707;--line:#e6e6e6;--btn:#070707;--apply:#e6e6e6;--pin:#ea4335;
  --font:"Open Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
  font-family:var(--font);color:var(--ink);
  max-width:1320px;margin:0 auto;padding:8px 16px 40px;box-sizing:border-box;-webkit-font-smoothing:antialiased}
#atr-root *{box-sizing:border-box}
#atr-root a{text-decoration:none;color:inherit}
/* filter bar */
.atr-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line);margin-bottom:14px}
.atr-in{font:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;outline:none;height:38px}
.atr-in:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(241,61,61,.15)}
#atr-q{flex:1 1 200px;min-width:160px}
.atr-sm{width:104px}
select.atr-in{cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:28px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='none' stroke='%23666' stroke-width='2'><path d='M1 3l4 4 4-4'/></svg>");
  background-repeat:no-repeat;background-position:right 10px center}
.atr-reset{font:inherit;font-size:13px;font-weight:600;color:var(--red);background:none;border:0;cursor:pointer;padding:8px}
.atr-count{font-size:13px;color:#666;margin-left:auto}
/* two-pane */
.atr-split{display:flex;gap:18px;align-items:flex-start}
.atr-map-wrap{flex:0 0 40%;position:sticky;top:12px;align-self:flex-start}
#atr-map{height:calc(100vh - 90px);min-height:520px;border-radius:12px;overflow:hidden;background:#e9edf0;border:1px solid var(--line)}
.atr-grid{flex:1 1 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:16px;min-width:0}
/* card */
.atr-card{background:#fff;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;
  border:1px solid var(--line);transition:box-shadow .16s,transform .16s}
.atr-card:hover{box-shadow:0 14px 34px -18px rgba(7,7,7,.4);transform:translateY(-2px)}
.atr-card.atr-hl{box-shadow:0 0 0 2px var(--red),0 14px 34px -18px rgba(7,7,7,.4)}
.atr-media{position:relative;display:block;aspect-ratio:4/3;background:#eceff3}
.atr-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s}
.atr-media img.on{opacity:1}
.atr-badge{position:absolute;bottom:0;background:rgba(255,255,255,.86);color:var(--ink);
  font-size:14px;font-weight:600;padding:7px 12px;line-height:1}
.atr-price{left:0}
.atr-avail{right:0;font-weight:500}
.atr-body{display:block;padding:13px 14px 6px}
.atr-title{font-size:16px;font-weight:700;line-height:1.25;margin-bottom:7px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px}
.atr-addr{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:10px}
.atr-specs{display:flex;gap:13px;align-items:center;font-size:13px;color:#222;padding:0 14px 12px}
.atr-specs span{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.atr-specs svg{width:16px;height:16px;flex:none}
.atr-actions{display:grid;grid-template-columns:1fr 1fr;margin-top:auto}
.atr-btn{text-align:center;padding:11px 8px;font-size:14px;letter-spacing:1px;text-transform:uppercase}
#atr-root a.atr-details{background:var(--btn);color:#fff}
#atr-root a.atr-details:hover{background:var(--red)}
#atr-root a.atr-apply{background:var(--apply);color:var(--ink)}
#atr-root a.atr-apply:hover{background:#d8d8d8}
.atr-empty{text-align:center;padding:60px 20px;color:#666}
.atr-head{padding:6px 4px 2px}
.atr-head span{display:block;font-size:13px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.atr-head{font-size:24px;font-weight:700;line-height:1.15}
/* map popup */
.atr-pop{width:190px;font-family:inherit}
.atr-pop img{width:100%;height:104px;object-fit:cover;border-radius:6px;display:block;margin-bottom:6px}
.atr-pop .pp{font-weight:700;font-size:14px}
.atr-pop .pt{font-size:12px;color:#333;margin:2px 0 6px;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.atr-pop a{color:var(--red);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.leaflet-popup-content{margin:10px}
#atr-map .leaflet-div-icon{background:transparent;border:0}
#atr-map .atr-pin{filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
/* responsive */
@media(max-width:900px){
  .atr-split{flex-direction:column}
  .atr-map-wrap{position:relative;top:0;flex:none;width:100%}
  #atr-map{height:300px;min-height:0}
  .atr-grid{width:100%;grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
}
</style>

<script>
(function(){
  // ================= CONFIG =================
  var CONFIG = {
    DATA_URL: 'listings.json',          // hosted listings.json for Squarespace
    DETAIL_BASE: 'homes/',              // folder of detail pages ('' to send to AppFolio)
    GOOGLE_MAPS_API_KEY: '',            // set for true Google Maps; blank => OpenStreetMap
    MAP_CENTER: [28.4, -81.3], MAP_ZOOM: 8
  };
  var ICONS = {
    bed:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7v11M3 12h18v6M21 18v-4a3 3 0 0 0-3-3H9"/><path d="M3 11V6a1 1 0 0 1 1-1h4a2 2 0 0 1 2 2v2"/></svg>',
    bath:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12V6a2 2 0 0 1 4 0M3 12h18v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/><path d="M6 19l-1 2M18 19l1 2"/></svg>',
    ruler:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="8" width="20" height="8" rx="1"/><path d="M6 8v3M10 8v4M14 8v3M18 8v4"/></svg>'
  };
  var $ = function(s){return document.querySelector(s);};
  var DATA = [], MAP = null;

  // ================= LOAD =================
  fetch(CONFIG.DATA_URL).then(function(r){return r.json();}).then(function(rows){
    DATA = rows.map(function(l){
      var parts=(l.address||'').split(',').map(function(s){return s.trim();});
      var zip=(l.address||'').match(/(\d{5})(?:-\d{4})?\s*$/);
      return {
        id:l.id, title:l.title||l.street||l.address, street:l.street||parts[0]||'',
        city:l.city||parts[1]||'', zip: zip?zip[1]:'',
        address:l.address||'', rent:l.rent||'', rent_val:l.rent_val||0,
        beds:(l.beds==null?null:l.beds), baths:(l.baths==null?null:l.baths),
        sqft:l.sqft||null, photo:l.photo||(l.photos&&l.photos[0])||'',
        available:l.available||'NOW', lat:l.lat, lng:l.lng,
        detail: CONFIG.DETAIL_BASE ? (CONFIG.DETAIL_BASE+l.id+'.html') : (l.appfolio_url||'#'),
        apply: l.apply_url||l.appfolio_url||'#'
      };
    });
    buildOptions(); wire(); MAP = makeMap(); apply();
  }).catch(function(e){ $('#atr-grid').innerHTML='<p style="color:#a00">Could not load listings.</p>'; console.error(e); });

  // ================= FILTER OPTIONS =================
  function buildOptions(){
    var cities={}, zips={};
    DATA.forEach(function(l){ if(l.city)cities[l.city]=1; if(l.zip)zips[l.zip]=1; });
    fill('#atr-city', Object.keys(cities).sort());
    fill('#atr-zip', Object.keys(zips).sort());
  }
  function fill(sel,arr){var s=$(sel);arr.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});}

  // ================= FILTER + RENDER =================
  function apply(){
    var q=$('#atr-q').value.trim().toLowerCase();
    var mn=parseInt($('#atr-min').value)||null, mx=parseInt($('#atr-max').value)||null;
    var bd=$('#atr-beds').value, ba=$('#atr-baths').value, ci=$('#atr-city').value, zp=$('#atr-zip').value;
    var rows=DATA.filter(function(l){
      if(q && l.address.toLowerCase().indexOf(q)<0 && (l.title||'').toLowerCase().indexOf(q)<0)return false;
      if(mn!=null && l.rent_val<mn)return false;
      if(mx!=null && l.rent_val>0 && l.rent_val>mx)return false;
      if(bd!=='' ){ if(bd==='0'){ if(l.beds!==0)return false; } else if((l.beds||0)<+bd)return false; }
      if(ba!=='' && (l.baths||0)<+ba)return false;
      if(ci && l.city!==ci)return false;
      if(zp && l.zip!==zp)return false;
      return true;
    });
    var s=$('#atr-sort').value, asc=function(v){return v>0?v:Infinity;};
    rows.sort(function(a,b){ return s==='rent_asc'?asc(a.rent_val)-asc(b.rent_val):s==='new'?(b.id||0)-(a.id||0):b.rent_val-a.rent_val; });
    renderGrid(rows); if(MAP)MAP.setData(rows);
    $('#atr-count').textContent=rows.length+(rows.length===1?' home':' homes');
    $('#atr-empty').style.display=rows.length?'none':'block';
  }
  function specVal(l){
    var b=l.beds===0?'Studio':(l.beds!=null?l.beds+' Beds':'N/A');
    var ba=l.baths!=null?l.baths+' Baths':'N/A';
    var sf=l.sqft!=null?l.sqft.toLocaleString():'N/A';
    return '<span>'+ICONS.bed+b+'</span><span>'+ICONS.bath+ba+'</span><span>'+ICONS.ruler+sf+'</span>';
  }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function renderGrid(rows){
    var g=$('#atr-grid'); g.innerHTML='';
    rows.forEach(function(l){
      var price=l.rent_val>0?esc(l.rent):'Contact';
      var c=document.createElement('div'); c.className='atr-card'; c.dataset.id=l.id;
      c.innerHTML=
        '<a class="atr-media" href="'+esc(l.detail)+'">'+
          (l.photo?'<img loading="lazy" src="'+esc(l.photo)+'" alt="">':'')+
          '<span class="atr-badge atr-price">'+price+'</span>'+
          '<span class="atr-badge atr-avail">'+esc(l.available)+'</span></a>'+
        '<a class="atr-body" href="'+esc(l.detail)+'">'+
          '<div class="atr-title">'+esc(l.title)+'</div>'+
          '<div class="atr-addr">'+esc(l.address)+'</div></a>'+
        '<div class="atr-specs">'+specVal(l)+'</div>'+
        '<div class="atr-actions"><a class="atr-btn atr-details" href="'+esc(l.detail)+'">Details</a>'+
          '<a class="atr-btn atr-apply" href="'+esc(l.apply)+'" target="_blank" rel="noopener">Apply</a></div>';
      var img=c.querySelector('img'); if(img){img.onload=function(){img.classList.add('on');}; if(img.complete)img.classList.add('on');}
      g.appendChild(c);
    });
  }
  function popHtml(l){
    return '<div class="atr-pop">'+(l.photo?'<img src="'+esc(l.photo)+'" alt="">':'')+
      '<div class="pp">'+(l.rent_val>0?esc(l.rent):'Contact')+'</div>'+
      '<div class="pt">'+esc(l.title)+'</div>'+
      '<a href="'+esc(l.detail)+'">View details →</a></div>';
  }
  function highlight(id){
    document.querySelectorAll('.atr-card.atr-hl').forEach(function(c){c.classList.remove('atr-hl');});
    var c=document.querySelector('.atr-card[data-id="'+id+'"]');
    if(c){c.classList.add('atr-hl'); c.scrollIntoView({behavior:'smooth',block:'center'});}
  }

  // ================= EVENTS =================
  function wire(){
    ['#atr-q','#atr-min','#atr-max','#atr-beds','#atr-baths','#atr-city','#atr-zip','#atr-sort']
      .forEach(function(s){$(s).addEventListener('input',apply);});
    $('#atr-reset').addEventListener('click',function(){
      ['#atr-q','#atr-min','#atr-max'].forEach(function(s){$(s).value='';});
      ['#atr-beds','#atr-baths','#atr-city','#atr-zip'].forEach(function(s){$(s).value='';});
      $('#atr-sort').value='rent_desc'; apply();
    });
  }

  // ================= MAP (Google if key, else Leaflet/OSM) =================
  var RED_PIN='<svg xmlns="http://www.w3.org/2000/svg" width="26" height="38" viewBox="0 0 26 38"><path d="M13 0C5.8 0 0 5.8 0 13c0 9.2 13 25 13 25s13-15.8 13-25C26 5.8 20.2 0 13 0z" fill="#ea4335"/><circle cx="13" cy="13" r="5" fill="#fff"/></svg>';
  function makeMap(){
    if(CONFIG.GOOGLE_MAPS_API_KEY) return makeGoogle();
    return makeLeaflet();
  }
  function loadScript(src,cb){var s=document.createElement('script');s.src=src;s.async=true;s.onload=cb;document.head.appendChild(s);}
  function loadCss(href){var l=document.createElement('link');l.rel='stylesheet';l.href=href;document.head.appendChild(l);}

  function makeLeaflet(){
    var api={pending:null,map:null,layer:null};
    loadCss('https://unpkg.com/leaflet@1.9.4/dist/leaflet.css');
    loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',function(){
      api.map=L.map('atr-map',{scrollWheelZoom:false}).setView(CONFIG.MAP_CENTER,CONFIG.MAP_ZOOM);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        {maxZoom:19,attribution:'&copy; OpenStreetMap, &copy; CARTO'}).addTo(api.map);
      api.layer=L.layerGroup().addTo(api.map);
      try{var ro=new ResizeObserver(function(){if(api.map)api.map.invalidateSize();});ro.observe(document.getElementById('atr-map'));}catch(e){}
      api.map.whenReady(function(){setTimeout(function(){api.map.invalidateSize();if(api.last)api.render(api.last);},60);});
      if(api.pending){api.render(api.pending);api.pending=null;}
    });
    var icon=function(){return L.divIcon({className:'atr-pin',html:RED_PIN,iconSize:[26,38],iconAnchor:[13,38],popupAnchor:[0,-34]});};
    api.render=function(rows){
      api.last=rows; api.map.invalidateSize();
      api.layer.clearLayers(); var pts=[];
      rows.forEach(function(l){ if(l.lat==null||l.lng==null)return;
        var m=L.marker([l.lat,l.lng],{icon:icon()}).bindPopup(popHtml(l));
        m.on('click',function(){highlight(l.id);}); m.addTo(api.layer); pts.push([l.lat,l.lng]);
      });
      if(pts.length){
        var bb=L.latLngBounds(pts);
        if(bb.getNorth()-bb.getSouth()<0.004 && bb.getEast()-bb.getWest()<0.004){ api.map.setView(bb.getCenter(),15); }
        else { api.map.fitBounds(pts,{padding:[40,40],maxZoom:13}); }
      }
    };
    return {setData:function(rows){ if(api.map)api.render(rows); else api.pending=rows; },
            refresh:function(){ if(api.map&&api.last)api.render(api.last); else if(api.map)api.map.invalidateSize(); }};
  }

  function makeGoogle(){
    var api={map:null,markers:[],pending:null,info:null};
    window.__atrGmapInit=function(){
      api.map=new google.maps.Map(document.getElementById('atr-map'),
        {center:{lat:CONFIG.MAP_CENTER[0],lng:CONFIG.MAP_CENTER[1]},zoom:CONFIG.MAP_ZOOM,
         mapTypeControl:false,streetViewControl:false,fullscreenControl:false});
      api.info=new google.maps.InfoWindow();
      if(api.pending){api.render(api.pending);api.pending=null;}
    };
    loadScript('https://maps.googleapis.com/maps/api/js?key='+encodeURIComponent(CONFIG.GOOGLE_MAPS_API_KEY)+'&callback=__atrGmapInit');
    api.render=function(rows){
      api.last=rows;
      api.markers.forEach(function(m){m.setMap(null);}); api.markers=[];
      var b=new google.maps.LatLngBounds(), n=0;
      rows.forEach(function(l){ if(l.lat==null||l.lng==null)return;
        var m=new google.maps.Marker({position:{lat:l.lat,lng:l.lng},map:api.map});
        m.addListener('click',function(){api.info.setContent(popHtml(l));api.info.open(api.map,m);highlight(l.id);});
        api.markers.push(m); b.extend(m.getPosition()); n++;
      });
      if(n)api.map.fitBounds(b);
    };
    return {setData:function(rows){ if(api.map)api.render(rows); else api.pending=rows; },
            refresh:function(){ if(api.map){google.maps.event.trigger(api.map,'resize'); if(api.last)api.render(api.last);} }};
  }

  // Repaint the map when the page is restored (bfcache back/forward, tab refocus, resize).
  window.addEventListener('pageshow', function(){ if(MAP&&MAP.refresh)MAP.refresh(); });

  // Optional: adopt the host site's font. The Squarespace page can postMessage
  // {type:'atr-font', font:'<family stack>'} and the widget switches to it live.
  // Defaults to Open Sans if no message arrives. (See HANDOFF.md for the snippet.)
  window.addEventListener('message', function(e){
    var d=e.data;
    if(d && d.type==='atr-font' && typeof d.font==='string'){
      var f=d.font.trim();
      if(f && f.length<200 && /^[\w\s,."'()\-]+$/.test(f)){
        var root=document.getElementById('atr-root');
        if(root) root.style.setProperty('--font', f);
      }
    }
  });
})();
</script>
<!-- WIDGET END -->

</body>
</html>
